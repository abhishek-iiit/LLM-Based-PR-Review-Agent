name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run ruff (lint)
        run: ruff check src/ tests/

      - name: Run ruff (format check)
        run: ruff format --check src/ tests/

      - name: Run mypy
        run: mypy -p pr_review_agent
        env:
          # Mypy needs stubs; skip checking the actual API calls
          GEMINI_API_KEY: AIzaplaceholder
          GITHUB_TOKEN: ghp_placeholder

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/unit/ -v --cov=src/pr_review_agent --cov-report=xml
        env:
          GEMINI_API_KEY: AIzaTestKey1234567890abcdef
          GITHUB_TOKEN: ghp_testtoken1234

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: pr-review-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
